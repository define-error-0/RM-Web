# 构建 esptool-js 库并部署到 GitHub Pages
# 站点地址: https://define-error-0.github.io/RM-Web/

name: Deploy GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vendor/esptool-js/package-lock.json

      - name: Build esptool-js library
        working-directory: vendor/esptool-js
        run: |
          npm ci
          npm run build

      - name: Verify esptool-js build
        run: |
          test -f vendor/esptool-js/lib/index.js
          test -f vendor/esptool-js/bundle.js
          test -f vendor/pako/pako.esm.mjs

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html 404.html Connection.html EspFlash.html esp-flash.js serve.json .nojekyll _site/
          cp -r bin _site/bin
          cp -r vendor _site/vendor
          rm -rf _site/vendor/esptool-js/node_modules
          rm -rf _site/vendor/esptool-js/.parcel-cache

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
