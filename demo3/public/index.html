<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playwright MCP 前端错误测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 40px;
            padding: 25px;
            border-radius: 10px;
            border-left: 5px solid #667eea;
            background: #f8f9fa;
        }

        .section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .btn-warning:hover {
            background: #e67e22;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4);
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
        }

        .result-area {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .error {
            color: #e74c3c;
        }

        .success {
            color: #27ae60;
        }

        .warning {
            color: #f39c12;
        }

        .info {
            color: #3498db;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-200 { background: #27ae60; }
        .status-404 { background: #f39c12; }
        .status-500 { background: #e74c3c; }
        .status-503 { background: #9b59b6; }

        .log-entry {
            margin-bottom: 8px;
            padding: 5px 0;
            border-bottom: 1px solid #34495e;
        }

        .timestamp {
            color: #95a5a6;
            font-size: 12px;
        }

        .clear-btn {
            background: #95a5a6;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .clear-btn:hover {
            background: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Playwright MCP 前端错误测试</h1>
            <p>测试各种前端错误场景和接口异常情况</p>
        </div>

        <div class="content">
            <!-- 接口测试区域 -->
            <div class="section">
                <h2>🔌 接口测试</h2>
                <p>测试各种HTTP状态码和错误情况</p>
                
                <div class="button-group">
                    <button class="btn btn-success" onclick="testHealth()">健康检查 (200)</button>
                    <button class="btn btn-danger" onclick="test500Error()">服务器错误 (500)</button>
                    <button class="btn btn-warning" onclick="test404Error()">资源不存在 (404)</button>
                    <button class="btn btn-warning" onclick="test503Error()">服务不可用 (503)</button>
                    <button class="btn btn-primary" onclick="testTimeout()">超时测试 (10s)</button>
                </div>
            </div>

            <!-- 前端错误测试区域 -->
            <div class="section">
                <h2>💥 前端错误测试</h2>
                <p>测试各种JavaScript错误和异常</p>
                
                <div class="button-group">
                    <button class="btn btn-danger" onclick="triggerReferenceError()">引用错误</button>
                    <button class="btn btn-danger" onclick="triggerTypeError()">类型错误</button>
                    <button class="btn btn-danger" onclick="triggerSyntaxError()">语法错误</button>
                    <button class="btn btn-warning" onclick="triggerAsyncError()">异步错误</button>
                    <button class="btn btn-warning" onclick="triggerPromiseRejection()">Promise拒绝</button>
                    <button class="btn btn-primary" onclick="triggerConsoleError()">Console错误</button>
                </div>
            </div>

            <!-- 网络错误测试区域 -->
            <div class="section">
                <h2>🌐 网络错误测试</h2>
                <p>测试网络请求失败和CORS错误</p>
                
                <div class="button-group">
                    <button class="btn btn-danger" onclick="testCorsError()">CORS错误</button>
                    <button class="btn btn-danger" onclick="testNetworkError()">网络错误</button>
                    <button class="btn btn-warning" onclick="testInvalidUrl()">无效URL</button>
                </div>
            </div>

            <!-- 结果显示区域 -->
            <div class="section">
                <h2>📊 测试结果</h2>
                <p>查看控制台输出和网络请求结果</p>
                
                <div class="result-area" id="resultArea">
                    <div class="log-entry">
                        <span class="timestamp">[系统]</span>
                        <span class="info">页面加载完成，可以开始测试各种错误场景</span>
                    </div>
                    <div class="log-entry">
                        <span class="timestamp">[提示]</span>
                        <span class="info">请打开浏览器开发者工具查看Console和Network标签页</span>
                    </div>
                </div>
                
                <button class="clear-btn" onclick="clearResults()">清空结果</button>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let requestCount = 0;

        // 日志记录函数
        function log(message, type = 'info') {
            const resultArea = document.getElementById('resultArea');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `
                <span class="timestamp">[${timestamp}]</span>
                <span class="${type}">${message}</span>
            `;
            resultArea.appendChild(logEntry);
            resultArea.scrollTop = resultArea.scrollHeight;
            
            // 同时输出到控制台
            switch(type) {
                case 'error':
                    console.error(message);
                    break;
                case 'warning':
                    console.warn(message);
                    break;
                case 'success':
                    console.log(message);
                    break;
                default:
                    console.log(message);
            }
        }

        // 清空结果
        function clearResults() {
            const resultArea = document.getElementById('resultArea');
            resultArea.innerHTML = `
                <div class="log-entry">
                    <span class="timestamp">[系统]</span>
                    <span class="info">结果已清空</span>
                </div>
            `;
        }

        // 接口测试函数
        async function testHealth() {
            try {
                log('开始健康检查...', 'info');
                const response = await fetch('/api/health');
                const data = await response.json();
                log(`✅ 健康检查成功: ${JSON.stringify(data)}`, 'success');
            } catch (error) {
                log(`❌ 健康检查失败: ${error.message}`, 'error');
            }
        }

        async function test500Error() {
            try {
                log('测试500错误接口...', 'info');
                const response = await fetch('/api/error');
                const data = await response.json();
                log(`⚠️ 500错误接口返回: ${JSON.stringify(data)}`, 'warning');
            } catch (error) {
                log(`❌ 500错误接口请求失败: ${error.message}`, 'error');
            }
        }

        async function test404Error() {
            try {
                log('测试404错误接口...', 'info');
                const response = await fetch('/api/notfound');
                const data = await response.json();
                log(`⚠️ 404错误接口返回: ${JSON.stringify(data)}`, 'warning');
            } catch (error) {
                log(`❌ 404错误接口请求失败: ${error.message}`, 'error');
            }
        }

        async function test503Error() {
            try {
                log('测试503错误接口...', 'info');
                const response = await fetch('/api/db-error');
                const data = await response.json();
                log(`⚠️ 503错误接口返回: ${JSON.stringify(data)}`, 'warning');
            } catch (error) {
                log(`❌ 503错误接口请求失败: ${error.message}`, 'error');
            }
        }

        async function testTimeout() {
            try {
                log('测试超时接口...', 'info');
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000); // 5秒超时
                
                const response = await fetch('/api/timeout', {
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                const data = await response.json();
                log(`✅ 超时接口完成: ${JSON.stringify(data)}`, 'success');
            } catch (error) {
                if (error.name === 'AbortError') {
                    log(`⏰ 请求超时 (5秒)`, 'warning');
                } else {
                    log(`❌ 超时接口请求失败: ${error.message}`, 'error');
                }
            }
        }

        // 前端错误测试函数
        function triggerReferenceError() {
            try {
                log('触发引用错误...', 'info');
                // 故意引用未定义的变量
                const result = undefinedVariable.someMethod();
                log(`引用错误结果: ${result}`, 'success');
            } catch (error) {
                log(`❌ 引用错误: ${error.message}`, 'error');
            }
        }

        function triggerTypeError() {
            try {
                log('触发类型错误...', 'info');
                // 故意调用不存在的方法
                const str = "Hello World";
                str.nonExistentMethod();
                log('类型错误测试完成', 'success');
            } catch (error) {
                log(`❌ 类型错误: ${error.message}`, 'error');
            }
        }

        function triggerSyntaxError() {
            try {
                log('触发语法错误...', 'info');
                // 使用eval执行有语法错误的代码
                eval('const x = ;');
                log('语法错误测试完成', 'success');
            } catch (error) {
                log(`❌ 语法错误: ${error.message}`, 'error');
            }
        }

        function triggerAsyncError() {
            log('触发异步错误...', 'info');
            setTimeout(() => {
                try {
                    throw new Error('这是一个异步错误');
                } catch (error) {
                    log(`❌ 异步错误: ${error.message}`, 'error');
                }
            }, 100);
        }

        function triggerPromiseRejection() {
            log('触发Promise拒绝...', 'info');
            Promise.reject(new Error('这是一个Promise拒绝错误'))
                .catch(error => {
                    log(`❌ Promise拒绝: ${error.message}`, 'error');
                });
        }

        function triggerConsoleError() {
            log('触发Console错误...', 'info');
            console.error('这是一个Console错误消息');
            console.warn('这是一个Console警告消息');
            log('Console错误已触发，请查看控制台', 'success');
        }

        // 网络错误测试函数
        function testCorsError() {
            log('测试CORS错误...', 'info');
            // 尝试访问一个不支持CORS的API
            fetch('https://httpbin.org/status/200')
                .then(response => response.json())
                .then(data => {
                    log(`✅ CORS测试成功: ${JSON.stringify(data)}`, 'success');
                })
                .catch(error => {
                    log(`❌ CORS错误: ${error.message}`, 'error');
                });
        }

        function testNetworkError() {
            log('测试网络错误...', 'info');
            // 尝试访问一个不存在的域名
            fetch('https://nonexistent-domain-12345.com/api/test')
                .then(response => response.json())
                .then(data => {
                    log(`✅ 网络测试成功: ${JSON.stringify(data)}`, 'success');
                })
                .catch(error => {
                    log(`❌ 网络错误: ${error.message}`, 'error');
                });
        }

        function testInvalidUrl() {
            log('测试无效URL...', 'info');
            try {
                // 故意使用无效的URL
                fetch('invalid-url-format')
                    .then(response => response.json())
                    .then(data => {
                        log(`✅ 无效URL测试成功: ${JSON.stringify(data)}`, 'success');
                    })
                    .catch(error => {
                        log(`❌ 无效URL错误: ${error.message}`, 'error');
                    });
            } catch (error) {
                log(`❌ 无效URL捕获错误: ${error.message}`, 'error');
            }
        }

        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            log('🚀 页面加载完成！', 'success');
            log('💡 现在可以开始测试各种错误场景', 'info');
            log('🔍 请打开浏览器开发者工具查看Console和Network标签页', 'info');
            
            // 添加全局错误处理器
            window.addEventListener('error', function(event) {
                log(`🌐 全局错误: ${event.message}`, 'error');
            });

            window.addEventListener('unhandledrejection', function(event) {
                log(`🚫 未处理的Promise拒绝: ${event.reason}`, 'error');
            });
        });

        // 定期输出一些信息到控制台
        setInterval(() => {
            console.log(`[${new Date().toLocaleTimeString()}] 系统运行中...`);
        }, 30000); // 每30秒输出一次
    </script>
</body>
</html>
