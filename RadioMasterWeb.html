          let userChanged = false;
          input.addEventListener('input', () => { userChanged = true; });
          input.onchange = () => {
            if (!userChanged) return; userChanged = false;
            // 这里只打印，不自动刷新
          };
          control.appendChild(input);
        } else if (param.baseType === 13) {
          // COMMAND
          const btn = document.createElement('button');
          btn.textContent = '启动';
          btn.style.minWidth = '130px';
          btn.style.maxWidth = '130px';
          btn.onclick = () => {
            const modeByte = mode === 'TX' ? 0x11 : 0x22;
            const arrStart = [0xA5, 0x33, modeByte, param.paramNum, 1, 0x0D, 0x0A];
            if (writer) writer.write(new Uint8Array(arrStart));
            // --- 弹窗与自动指令逻辑 ---
            let dialog = document.createElement('div');
            dialog.style.position = 'fixed';
            dialog.style.left = '0';
            dialog.style.top = '0';
            dialog.style.width = '100vw';
            dialog.style.height = '100vh';
            dialog.style.background = 'rgba(0,0,0,0.18)';
            dialog.style.display = 'flex';
            dialog.style.alignItems = 'center';
            dialog.style.justifyContent = 'center';
            dialog.style.zIndex = '9999';
            let inner = document.createElement('div');
            inner.style.background = '#fff';
            inner.style.borderRadius = '16px';
            inner.style.boxShadow = '0 4px 24px rgba(79,140,255,0.18)';
            inner.style.padding = '38px 48px 32px 48px';
            inner.style.display = 'flex';
            inner.style.flexDirection = 'column';
            inner.style.alignItems = 'center';
            inner.style.minWidth = '260px';
            inner.style.maxWidth = '90vw';
            inner.innerHTML = `<div style="font-size:1.18em;color:#3358e0;font-weight:bold;margin-bottom:18px;">${param.name||'命令操作'}</div>`;
            let msg = document.createElement('div');
            msg.style.fontSize = '1.08em';
            msg.style.color = '#222';
            msg.style.marginBottom = '18px';
            inner.appendChild(msg);
            let closeBtn = null;
            let timer = null;
            let poller = null;
            // 判断bind类
            const isBind = (param.name && /bind|对频|配对/i.test(param.name)) || (param.info && /bind|对频|配对/i.test(param.info));
            if (isBind) {
              msg.textContent = '正在对频...';
              document.body.appendChild(dialog);
              dialog.appendChild(inner);
              // 2秒后自动发送06并关闭
              timer = setTimeout(() => {
                const arrEnd = [0xA5, 0x33, modeByte, param.paramNum, 6, 0x0D, 0x0A];
                if (writer) writer.write(new Uint8Array(arrEnd));
                document.body.removeChild(dialog);
              }, 2000);
            } else {
              msg.textContent = '正在操作...';
              closeBtn = document.createElement('button');
              closeBtn.textContent = '结束';
              closeBtn.style.marginTop = '12px';
              closeBtn.style.background = 'linear-gradient(90deg,#e74c3c 0%,#c0392b 100%)';
              closeBtn.style.color = '#fff';
              closeBtn.style.border = 'none';
              closeBtn.style.borderRadius = '8px';
              closeBtn.style.padding = '10px 32px';
              closeBtn.style.fontSize = '1.08em';
              closeBtn.style.fontWeight = 'bold';
              closeBtn.style.cursor = 'pointer';
              closeBtn.onclick = () => {
                if (poller) clearInterval(poller);
                const arrStop = [0xA5, 0x33, modeByte, param.paramNum, 5, 0x0D, 0x0A];
                if (writer) writer.write(new Uint8Array(arrStop));
                document.body.removeChild(dialog);
              };
              inner.appendChild(closeBtn);
              document.body.appendChild(dialog);
              dialog.appendChild(inner);
              // 每1.5秒发送06
              poller = setInterval(() => {
                const arrPoll = [0xA5, 0x33, modeByte, param.paramNum, 6, 0x0D, 0x0A];
                if (writer) writer.write(new Uint8Array(arrPoll));
                console.log('持续类轮询发送POLL:', arrPoll.map(x=>x.toString(16).padStart(2,'0')).join(' '));
              }, 1500);
            }
          };
          control.appendChild(btn);
          if (param.info) {
            const infoSpan = document.createElement('span');
            infoSpan.textContent = param.info;
            infoSpan.style.marginLeft = '8px';
            control.appendChild(infoSpan);
          }
        } else if (param.baseType === 12) {
          const span = document.createElement('span');
          span.textContent = param.value;
          control.appendChild(span);
        } else {
          const span = document.createElement('span');
          span.textContent = param.value;
          control.appendChild(span);
        }
        item.appendChild(control);
        container.appendChild(item);
      });
    }

    // ========== 页面切换到无线配置时自动刷新 ==========
    const _orig_showMainPage = showMainPage;
    showMainPage = function(page) {
      _orig_showMainPage.apply(this, arguments);
      if (page === 'net') {
        if (!window._netPageAutoRefreshed) {
          window._netPageAutoRefreshed = true;
          netConfBuffer = [];
          autoRefresh('TX');
        }
      }
      // 新增：切换到设备配置页面时渲染通道/trim/中心点
      if (page === 'config') {
        renderConfigPage();
      }
    };

    // ========== 刷新RX按钮逻辑增强 ==========
    document.getElementById('refresh-settings-rx').onclick = async () => {
      netConfBuffer = [];
      document.getElementById('refresh-settings-rx').disabled = true;
      const statusElem = document.getElementById('settings-status-rx');
      statusElem.textContent = '正在获取设置...';
      let timeout = setTimeout(() => {
        document.getElementById('refresh-settings-rx').disabled = false;
        statusElem.textContent = '超时';
      }, 20000);
      await refreshSettingsRX();
      setTimeout(() => {
        if (statusElem.textContent === '刷新完成') clearTimeout(timeout);
      }, 1000);
      // 切换到RX控件（不自动刷新RX，只渲染）
    };

    // 设备配置页面渲染函数
    function renderConfigPage() {
      const configPage = document.getElementById('page-config');
      if (!configPage) return;
      // 操作模式定义（标准飞控手法）
      // M1: 左油门右副翼, M2: 左副翼右油门, M3: 左油门右方向, M4: 左方向右油门
      const modeList = [
        { name: 'M1', map: ['ELE', 'RUD', 'THR', 'AIL'] }, // 左油门右副翼
        { name: 'M2', map: ['THR', 'RUD', 'ELE', 'AIL'] }, // 左副翼右油门
        { name: 'M3', map: ['ELE', 'AIL', 'THR', 'RUD'] }, // 左油门右方向
        { name: 'M4', map: ['THR', 'AIL', 'ELE', 'RUD'] }, // 左方向右油门
      ];
      let currentModeIdx = window._currentModeIdx || 0;
      function getModeMap(idx) { return modeList[idx].map; }
      let html = '<div class="comm-container"><div class="comm-title">设备配置</div>';
      html += '<div style="margin:18px 0 24px 0;display:flex;align-items:center;gap:24px;">';
      html += '<label style="font-weight:bold;color:#3358e0;font-size:1.13em;">操作模式：</label>';
      html += '<select id="mode-select" style="font-size:1.13em;padding:8px 18px;border-radius:8px;border:1.5px solid #d0d7e6;">';
      modeList.forEach((m, i) => {
        html += `<option value="${i}"${i===currentModeIdx?' selected':''}>${m.name}</option>`;
      });
      html += '</select>';
      html += '</div>';
      // ...原有通道/trim/中心点渲染...
      const channelNum = 10;
      const trimNum = 4;
      const centerNum = 4;
      let channels = [];
      for (let i = 0; i < channelNum; i++) {
        channels.push(Math.round(Math.random() * 200 - 100));
      }
      let trims = [];
      for (let i = 0; i < trimNum; i++) {
        trims.push(Math.round(Math.random() * 200 - 100));
      }
      let centers = [];
      for (let i = 0; i < centerNum; i++) {
        centers.push(Math.round(Math.random() * 200 - 100));
      }
      html += '<div style="font-weight:bold;color:#3358e0;margin-bottom:8px;">通道数据</div>';
      html += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">';
      for (let i = 0; i < channelNum; i++) {
        html += `<div style="background:#f4f8ff;border-radius:8px;padding:10px 8px;display:flex;flex-direction:column;align-items:center;">
          <span style="color:#3358e0;font-weight:500;">CH${i+1}</span>
          <span id="ch-val-${i}" style="font-family:'Roboto Mono',monospace;font-size:1.18em;margin-top:6px;">${channels[i]}</span>
          <div id="ch-bar-${i}" style="width:100px;height:8px;background:#e0e7ff;border-radius:4px;margin-top:8px;overflow:hidden;">
            <div style="height:8px;background:linear-gradient(90deg,#4f8cff 0%,#3358e0 100%);width:${(channels[i]+100)/2}%"></div>
          </div>
          <input type="number" id="ch-input-${i}" value="${channels[i]}" style="width:70px;margin-top:8px;text-align:center;border:1.5px solid #d0d7e6;border-radius:6px;font-size:1em;" />
        </div>`;
      }
      html += '</div>';
      // Trim横杆
      html += '<div style="font-weight:bold;color:#3358e0;margin:24px 0 8px 0;">Trim 行程</div>';
      html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:18px;">';
      for (let i = 0; i < trimNum; i++) {
        const min = -100, max = 100, val = trims[i];
        const percent = ((val - min) / (max - min)) * 100;
        html += `<div style="background:#eaf1ff;border-radius:8px;padding:18px 12px;display:flex;flex-direction:column;align-items:center;">
          <span style="color:#3358e0;font-weight:500;margin-bottom:8px;">Trim${i+1}</span>
          <div style="width:120px;height:12px;position:relative;margin:12px 0 8px 0;">
            <div style="position:absolute;top:5px;left:0;width:100%;height:2px;background:#b3cfff;border-radius:2px;"></div>
            <div id="trim-dot-${i}" style="position:absolute;top:0;left:calc(${percent}% - 7px);width:14px;height:14px;background:#4f8cff;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 8px #b3cfff;"></div>
          </div>
          <span id="trim-val-${i}" style="font-family:'Roboto Mono',monospace;font-size:1.08em;">${val}</span>
          <input type="number" id="trim-input-${i}" value="${val}" style="width:70px;margin-top:8px;text-align:center;border:1.5px solid #d0d7e6;border-radius:6px;font-size:1em;" />
        </div>`;
      }
      html += '</div>';
      // 中心点横杆
      html += '<div style="font-weight:bold;color:#3358e0;margin:24px 0 8px 0;">中心点行程</div>';
      html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:18px;">';
      for (let i = 0; i < centerNum; i++) {
        const min = -100, max = 100, val = centers[i];
        const percent = ((val - min) / (max - min)) * 100;
        html += `<div style="background:#f4f8ff;border-radius:8px;padding:18px 12px;display:flex;flex-direction:column;align-items:center;">
          <span style="color:#3358e0;font-weight:500;margin-bottom:8px;">Center${i+1}</span>
          <div style="width:120px;height:12px;position:relative;margin:12px 0 8px 0;">
            <div style="position:absolute;top:5px;left:0;width:100%;height:2px;background:#b3cfff;border-radius:2px;"></div>
            <div id="center-dot-${i}" style="position:absolute;top:0;left:calc(${percent}% - 7px);width:14px;height:14px;background:#2ecc71;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 8px #b3cfff;"></div>
          </div>
          <span id="center-val-${i}" style="font-family:'Roboto Mono',monospace;font-size:1.08em;">${val}</span>
          <input type="number" id="center-input-${i}" value="${val}" style="width:70px;margin-top:8px;text-align:center;border:1.5px solid #d0d7e6;border-radius:6px;font-size:1em;" />
        </div>`;
      }
      html += '</div>';
      // 十字指示区（更大）
      html += '<div style="margin-top:48px;display:flex;gap:80px;justify-content:center;">';
      // 左手
      html += '<div style="display:flex;flex-direction:column;align-items:center;">';
      html += '<div style="font-weight:bold;color:#3358e0;margin-bottom:16px;font-size:1.22em;">左手摇杆</div>';
      html += '<canvas id="cross-left" width="426" height="426" style="background:#f4f8ff;border-radius:22px;box-shadow:0 2px 16px #e0e7ff;"></canvas>';
      html += '</div>';
      // 右手
      html += '<div style="display:flex;flex-direction:column;align-items:center;">';
      html += '<div style="font-weight:bold;color:#3358e0;margin-bottom:16px;font-size:1.22em;">右手摇杆</div>';
      html += '<canvas id="cross-right" width="426" height="426" style="background:#f4f8ff;border-radius:22px;box-shadow:0 2px 16px #e0e7ff;"></canvas>';
      html += '</div>';
      html += '</div>';
      html += '</div>';
      configPage.innerHTML = html;
      // 交互：输入框动态修改控件
      for (let i = 0; i < channelNum; i++) {
        const input = document.getElementById(`ch-input-${i}`);
        input.oninput = function() {
          let v = Math.max(-100, Math.min(100, parseInt(input.value)||0));
          document.getElementById(`ch-val-${i}`).textContent = v;
          const bar = document.getElementById(`ch-bar-${i}`).children[0];
          bar.style.width = ((v+100)/2) + '%';
        };
      }
      for (let i = 0; i < trimNum; i++) {
        const input = document.getElementById(`trim-input-${i}`);
        input.oninput = function() {
          let v = Math.max(-100, Math.min(100, parseInt(input.value)||0));
          document.getElementById(`trim-val-${i}`).textContent = v;
          document.getElementById(`trim-dot-${i}`).style.left = `calc(${((v+100)/2)}% - 7px)`;
        };
      }
      for (let i = 0; i < centerNum; i++) {
        const input = document.getElementById(`center-input-${i}`);
        input.oninput = function() {
          let v = Math.max(-100, Math.min(100, parseInt(input.value)||0));
          document.getElementById(`center-val-${i}`).textContent = v;
          document.getElementById(`center-dot-${i}`).style.left = `calc(${((v+100)/2)}% - 7px)`;
        };
      }
      // 画十字指示
      function drawCross(canvas, modeMap, isLeft) {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const center = canvas.width / 2;
        const crossLen = canvas.width / 2 - 40;
        // 美化参数
        const arrowLen = crossLen - 40;
        const arrowWidth = 18;
        const fontSize = 32;
        const labelBg = '#fff';
        const labelColor = '#3358e0';
        const labelShadow = 'rgba(79,140,255,0.13)';
        // 只画两个方向的箭头和字母
        function drawArrowWithLabel(x0, y0, dx, dy, label, labelAlign) {
          // 箭头
          ctx.save();
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo(x0 + dx * (arrowLen - 24), y0 + dy * (arrowLen - 24));
          ctx.strokeStyle = ctx.createLinearGradient(x0, y0, x0 + dx * arrowLen, y0 + dy * arrowLen);
          ctx.strokeStyle.addColorStop(0, '#4f8cff');
          ctx.strokeStyle.addColorStop(1, '#3358e0');
          ctx.lineWidth = 10;
          ctx.lineCap = 'round';
          ctx.stroke();
          // 箭头头部
          const endX = x0 + dx * arrowLen;
          const endY = y0 + dy * arrowLen;
          ctx.beginPath();
          ctx.moveTo(endX, endY);
          ctx.lineTo(endX - dy * arrowWidth / 2 - dx * arrowWidth, endY + dx * arrowWidth / 2 - dy * arrowWidth);
          ctx.lineTo(endX + dy * arrowWidth / 2 - dx * arrowWidth, endY - dx * arrowWidth / 2 - dy * arrowWidth);
          ctx.closePath();
          ctx.fillStyle = '#3358e0';
          ctx.shadowColor = '#b3cfff';
          ctx.shadowBlur = 6;
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.restore();
          // 字母
          ctx.save();
          ctx.font = `bold ${fontSize}px Roboto`;
          ctx.textAlign = labelAlign;
          ctx.textBaseline = 'middle';
          // 字母位置：箭头外侧
          const labelOffset = 48;
          const labelX = x0 + dx * (arrowLen + labelOffset);
          const labelY = y0 + dy * (arrowLen + labelOffset);
          // 圆角背景
          const text = label;
          const textW = ctx.measureText(text).width + 28;
          ctx.beginPath();
          ctx.moveTo(labelX - textW/2, labelY - 24);
          ctx.lineTo(labelX + textW/2, labelY - 24);
          ctx.arcTo(labelX + textW/2 + 12, labelY - 24, labelX + textW/2 + 12, labelY + 24, 16);
          ctx.lineTo(labelX + textW/2 + 12, labelY + 24);
          ctx.arcTo(labelX + textW/2 + 12, labelY + 40, labelX + textW/2, labelY + 40, 16);
          ctx.lineTo(labelX - textW/2, labelY + 40);
          ctx.arcTo(labelX - textW/2 - 12, labelY + 40, labelX - textW/2 - 12, labelY + 24, 16);
          ctx.lineTo(labelX - textW/2 - 12, labelY - 24);
          ctx.arcTo(labelX - textW/2 - 12, labelY - 40, labelX - textW/2, labelY - 40, 16);
          ctx.closePath();
          ctx.fillStyle = labelBg;
          ctx.shadowColor = labelShadow;
          ctx.shadowBlur = 8;
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = labelColor;
          ctx.fillText(text, labelX, labelY);
          ctx.restore();
        }
        if (isLeft) {
          // 左摇杆：modeMap[0]上下，modeMap[1]左右
          drawArrowWithLabel(center, center, 0, -1, modeMap[0], 'center'); // 上
          drawArrowWithLabel(center, center, 0, 1, modeMap[0], 'center');  // 下
          drawArrowWithLabel(center, center, -1, 0, modeMap[1], 'right');  // 左
          drawArrowWithLabel(center, center, 1, 0, modeMap[1], 'left');    // 右
        } else {
          // 右摇杆：modeMap[2]上下，modeMap[3]左右
          drawArrowWithLabel(center, center, 0, -1, modeMap[2], 'center'); // 上
          drawArrowWithLabel(center, center, 0, 1, modeMap[2], 'center');  // 下
          drawArrowWithLabel(center, center, -1, 0, modeMap[3], 'right');  // 左
          drawArrowWithLabel(center, center, 1, 0, modeMap[3], 'left');    // 右
        }
        // 中心点
        ctx.beginPath();
        ctx.arc(center, center, 22, 0, 2*Math.PI);
        ctx.fillStyle = '#3358e0';
        ctx.fill();
      }
      // 初始绘制
      setTimeout(() => {
        const left = document.getElementById('cross-left');
        const right = document.getElementById('cross-right');
        if (left && right) {
          drawCross(left, getModeMap(currentModeIdx), 1);
          drawCross(right, getModeMap(currentModeIdx), 0);
        }
      }, 0);
      // 监听模式切换
      setTimeout(() => {
        const sel = document.getElementById('mode-select');
        if (sel) {
          sel.onchange = function() {
            window._currentModeIdx = parseInt(sel.value);
            const left = document.getElementById('cross-left');
            const right = document.getElementById('cross-right');
            if (left && right) {
              drawCross(left, getModeMap(window._currentModeIdx), 1);
              drawCross(right, getModeMap(window._currentModeIdx), 0);
            }
          };
        }
      }, 0);
    }

    // 连接成功后自动发送设备属性指令，失败重试3次，否则显示按钮
    let _autoDevAttrTries = 0;
    let _autoDevAttrMaxTries = 3;
    let _autoDevAttrTimer = null;
    async function autoSendDevAttr() {
      if (!writer) return;
      if (_autoDevAttrTries >= _autoDevAttrMaxTries) return;
      _autoDevAttrTries++;
      const devAttrCmd = new Uint8Array([0xA5, 0x55, 0x1D, 0x0D, 0x0A]);
      await writer.write(devAttrCmd);
      // 等待2秒，如果window._deviceInfo还没被赋值则重试
      _autoDevAttrTimer = setTimeout(() => {
        if (!window._deviceInfo && _autoDevAttrTries < _autoDevAttrMaxTries) {
          autoSendDevAttr();
        } else if (!window._deviceInfo && _autoDevAttrTries >= _autoDevAttrMaxTries) {
          // 失败，显示按钮
          renderDeviceInfoPage();
        }
      }, 2000);
    }
    // 连接成功后自动触发
    function onSerialConnected() {
      _autoDevAttrTries = 0;
      if (_autoDevAttrTimer) clearTimeout(_autoDevAttrTimer);
      window._deviceInfo = undefined;
      autoSendDevAttr();
    }
  </script>
