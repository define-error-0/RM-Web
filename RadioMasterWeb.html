<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>串口设备配置管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #e0e7ff 0%, #f4f6fb 100%);
      color: #222;
      min-height: 100vh;
    }
    .center-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
    }
    .card {
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 8px 36px rgba(79,140,255,0.15);
      padding: 48px 60px 40px 60px;
      min-width: 380px;
      max-width: 520px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.5s;
    }
    .card-title {
      font-size: 1.7em;
      font-weight: bold;
      color: #3358e0;
      margin-bottom: 32px;
      letter-spacing: 1px;
    }
    .form-group {
      width: 100%;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .form-group label {
      font-size: 1.08em;
      color: #3358e0;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-group select, .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d0d7e6;
      border-radius: 8px;
      font-size: 1.08em;
      outline: none;
      transition: border 0.2s;
      margin-bottom: 0;
    }
    .form-group input:focus, .form-group select:focus {
      border: 2px solid #4f8cff;
    }
    .connect-btn {
      width: 100%;
      background: linear-gradient(90deg, #4f8cff 0%, #3358e0 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 16px 0;
      font-size: 1.18em;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      margin-top: 16px;
    }
    .connect-btn:disabled {
      background: #b3cfff;
      cursor: not-allowed;
    }
    .connect-status {
      margin-top: 24px;
      font-size: 1.12em;
      color: #4f8cff;
      font-weight: bold;
      letter-spacing: 1px;
      min-height: 28px;
    }
    /* 通信页面布局 */
    .comm-container, .calib-container {
      width: 100%;
      max-width: 1200px;
      min-width: 0;
      margin: 0 auto !important;
      padding: 0 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      min-height: calc(100vh - 64px) !important;
      height: calc(100vh - 64px) !important;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
    }
    .main-content-area {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      min-height: 0;
      height: 100%;
      width: 100vw;
      max-width: 100vw;
      box-sizing: border-box;
      padding-left: 0;
      padding-right: 0;
    }
    .comm-title {
      font-size: 1.3em;
      font-weight: bold;
      color: #3358e0;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .comm-output-box {
      background: #f4f6fb;
      color: #222;
      border-radius: 8px;
      padding: 16px 12px 16px 16px;
      flex: 1 1 0;
      min-height: 180px;
      max-height: 100%;
      font-family: 'Roboto Mono', monospace;
      font-size: 1.08em;
      white-space: pre-wrap;
      box-shadow: 0 1px 4px rgba(79,140,255,0.04);
      overflow-y: auto;
      word-break: break-all;
      position: relative;
      margin-bottom: 0;
    }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .clear-btn {
      background: #e0e7ff;
      color: #3358e0;
      border: none;
      border-radius: 5px;
      padding: 5px 14px;
      font-size: 0.98em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      margin-left: 8px;
    }
    .clear-btn:hover {
      background: #3358e0;
      color: #fff;
    }
    .comm-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 8px;
    }
    .comm-input-row input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #d0d7e6;
      border-radius: 6px;
      font-size: 1em;
      outline: none;
      transition: border 0.2s;
    }
    .comm-input-row input[type="text"]:focus {
      border: 1.5px solid #4f8cff;
    }
    .comm-input-row select {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #d0d7e6;
      font-size: 1em;
      outline: none;
      transition: border 0.2s;
    }
    .comm-input-row button {
      background: #4f8cff;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      font-size: 1em;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .comm-input-row button:disabled {
      background: #b3cfff;
      cursor: not-allowed;
    }
    .comm-input-row button:not(:disabled):hover {
      background: #3358e0;
      transform: scale(1.04);
    }
    @media (max-width: 1300px) {
      .comm-container, .calib-container {
        max-width: 98vw;
      }
    }
    @media (max-width: 700px) {
      .comm-container, .calib-container {
        max-width: 100vw;
        min-width: 0;
        border-radius: 0 !important;
      }
    }
    /* 顶部信息栏 */
    #device-info-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1200;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1a1a1a;
      padding: 10px 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      min-height: 64px;
    }
    .logo-section {
      width: 200px;
      display: flex;
      align-items: center;
    }
    #logo-img {
      height: 44px;
      width: auto;
      max-width: 120px;
      cursor: pointer;
      border-radius: 8px;
    }
    .menu-section {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .menu-bar {
      display: flex;
      gap: 18px;
      justify-content: center;
      background: none;
      animation: fadeIn 0.7s;
    }
    .battery-section {
      width: 200px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }
    .battery-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    /* 新电池图标样式 */
    .battery-outer {
      position: relative;
      width: 32px;
      height: 18px;
      border: 2.5px solid #fff;
      border-radius: 7px;
      background: #23272f;
      box-shadow: 0 1px 4px rgba(79,140,255,0.10);
      display: flex;
      align-items: center;
      margin-right: 2px;
    }
    .battery-head {
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      width: 5px;
      height: 8px;
      background: #fff;
      border-radius: 2px;
      box-shadow: 0 0 2px #fff;
    }
    .battery-inner {
      position: absolute;
      left: 2.5px;
      top: 2.5px;
      bottom: 2.5px;
      width: 0;
      border-radius: 4px;
      transition: all 0.4s;
    }
    .battery-inner.high {
      background: linear-gradient(90deg, #2ecc71 60%, #b6fcd5 100%);
    }
    .battery-inner.medium {
      background: linear-gradient(90deg, #f1c40f 60%, #fffbe6 100%);
    }
    .battery-inner.low {
      background: linear-gradient(90deg, #e74c3c 60%, #ffd6d6 100%);
    }
    .battery-num {
      color: #fff;
      font-weight: 500;
      font-size: 1.08em;
      min-width: 40px;
      letter-spacing: 1px;
    }
    /* 菜单栏美化 */
    .menu-btn {
      background: none;
      color: #fff;
      border: none;
      padding: 10px 24px;
      font-size: 1em;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      letter-spacing: 1px;
    }
    .menu-btn::after {
      content: '';
      position: absolute;
      bottom: 6px;
      left: 24px;
      right: 24px;
      height: 2px;
      background: #fff;
      transform: scaleX(0);
      transition: transform 0.3s;
    }
    .menu-btn:hover::after,
    .menu-btn.active::after {
      transform: scaleX(1);
    }
    .menu-btn.active {
      color: #fff;
    }
    .menu-btn:hover {
      color: #fff;
    }
    .main-flex-root {
      padding-top: 84px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      width: 100vw;
      box-sizing: border-box;
      padding-left: 0;
      padding-right: 0;
    }
    .wireless-settings {
      padding: 0 !important;
      max-width: 100vw;
      margin: 0;
      gap: 18px;
      background: none;
    }
    .param-container {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 22px;
      background: #f4f8ff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(79,140,255,0.07);
      border: 1.5px solid #e0e7ff;
      transition: box-shadow 0.2s, border 0.2s;
      position: relative;
    }
    .setting-item:hover {
      box-shadow: 0 4px 16px rgba(79,140,255,0.13);
      border: 1.5px solid #4f8cff;
    }
    .setting-label {
      flex: 1 1 0;
      font-size: 1.08em;
      color: #3358e0;
      font-weight: 500;
      letter-spacing: 0.5px;
      min-width: 120px;
      margin-right: 18px;
      text-align: right;
    }
    .setting-control {
      min-width: 160px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .setting-control input[type="number"] {
      width: 90px;
      padding: 8px 10px;
      border: 1.5px solid #d0d7e6;
      border-radius: 6px;
      font-size: 1em;
      outline: none;
      transition: border 0.2s;
    }
    .setting-control input[type="number"]:focus {
      border: 1.5px solid #4f8cff;
    }
    .setting-control select {
      width: 120px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1.5px solid #d0d7e6;
      font-size: 1em;
      outline: none;
      transition: border 0.2s;
      background: #fff;
    }
    .setting-control select:focus {
      border: 1.5px solid #4f8cff;
    }
    .setting-control button {
      padding: 8px 18px;
      background: linear-gradient(90deg, #4f8cff 0%, #3358e0 100%);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 1px 4px rgba(79,140,255,0.08);
    }
    .setting-control button:hover {
      background: linear-gradient(90deg, #3358e0 0%, #4f8cff 100%);
      box-shadow: 0 2px 8px rgba(79,140,255,0.13);
    }
    .setting-control span {
      color: #222;
      font-size: 1.05em;
      background: none;
      padding: 0 4px;
    }
    @media (max-width: 700px) {
      .wireless-settings, .param-container { padding: 8px 2vw; }
      .setting-item { flex-direction: column; align-items: flex-start; padding: 14px 8px; }
      .setting-label { text-align: left; margin-bottom: 6px; }
      .setting-control { min-width: 0; width: 100%; }
      .setting-control input, .setting-control select { width: 100%; }
    }
    .device-info {
      background: #eaf1ff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(79,140,255,0.07);
      border: 1.5px solid #d0d7e6;
      padding: 18px 22px 10px 22px;
      margin-bottom: 18px;
    }
    /* --- UI美化 --- */
    /* 优化comm-container和param-container宽度、padding、控件尺寸 */
    .comm-container {
      max-width: 1100px !important;
      min-width: 600px !important;
      padding: 18px 18px 12px 18px !important;
      margin-bottom: 12px !important;
    }
    .param-container {
      gap: 10px !important;
      padding: 4px 2px !important;
    }
    .setting-item {
      padding: 8px 10px !important;
      gap: 8px !important;
      font-size: 1em !important;
    }
    .setting-label {
      min-width: 90px !important;
      font-size: 1em !important;
    }
    .setting-control input, .setting-control select, .setting-control button {
      font-size: 0.98em !important;
      padding: 5px 8px !important;
      min-height: 28px !important;
      height: 28px !important;
    }
    .setting-control button {
      padding: 5px 14px !important;
    }
    /* 父菜单样式 */
    .param-folder-root {
      background: #eaf1ff !important;
      color: #3358e0 !important;
      font-weight: bold !important;
      border-radius: 8px !important;
      font-size: 1.13em !important;
      padding-left: 18px !important;
      margin-bottom: 6px !important;
      display: flex;
      align-items: center;
      box-shadow: 0 2px 8px rgba(79,140,255,0.07);
      border: 1.5px solid #e0e7ff;
    }
    .param-folder-root .folder-icon {
      width: 18px; height: 18px; margin-right: 8px; opacity: 0.7;
    }
    .param-folder-child {
      background: #f7faff !important;
      color: #3358e0 !important;
      font-weight: 500 !important;
      border-radius: 6px !important;
      font-size: 1.05em !important;
      padding-left: 32px !important;
      margin-bottom: 4px !important;
      border: 1px solid #e0e7ff;
    }
    /* 校准页面样式 */
    .calib-title {
      font-size: 1.3em;
      font-weight: bold;
      color: #3358e0;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .calib-btn-group {
      display: flex;
      gap: 18px;
      margin-bottom: 18px;
    }
    .calib-btn {
      border: none;
      border-radius: 8px;
      background: #eaf1ff;
      color: #3358e0;
      font-size: 1.08em;
      font-weight: 500;
      padding: 10px 22px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      outline: none;
    }
    .calib-btn.active-high { background: #2ecc71; color: #fff; }
    .calib-btn.active-mid { background: #f1c40f; color: #fff; }
    .calib-btn.active-low { background: #e74c3c; color: #fff; }
    .calib-slider-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
    }
    .calib-slider-label {
      color: #3358e0;
      font-weight: 500;
      min-width: 40px;
    }
    .calib-slider {
      flex: 1;
      accent-color: #4f8cff;
      height: 6px;
      border-radius: 4px;
    }
    .calib-slider-value {
      min-width: 36px;
      color: #3358e0;
      font-weight: bold;
      font-size: 1.08em;
    }
    .calib-joystick-row {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 96px;
      width: 100%;
      margin: 0 auto;
      padding: 0;
      position: relative;
    }
    .calib-joystick-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 1050px;
      height: 1050px;
      position: relative;
    }
    .calib-joystick {
      width: 1050px !important;
      height: 1050px !important;
      max-width: 60vw !important;
      max-height: 90vh !important;
      min-width: 400px;
      min-height: 400px;
      margin: 0;
      display: block;
      background: #f4f6fb;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(79,140,255,0.07);
      border: 1.5px solid #e0e7ff;
    }
    .calib-joystick-label {
      text-align: center;
      color: #3358e0;
      font-weight: 500;
      margin-bottom: 6px;
    }
    @media (max-width: 2200px) {
      .calib-joystick, .calib-joystick-wrap { width: 700px !important; height: 700px !important; }
    }
    @media (max-width: 1400px) {
      .calib-joystick, .calib-joystick-wrap { width: 400px !important; height: 400px !important; min-width: 200px; min-height: 200px; }
    }
    @media (max-width: 900px) {
      .calib-joystick, .calib-joystick-wrap { width: 220px !important; height: 220px !important; min-width: 120px; min-height: 120px; }
      .calib-joystick-row { flex-direction: column; align-items: center; gap: 32px; }
    }
    /* 设备校准页面全白背景 */
    #page-calib {
      background: #fff !important;
      min-height: calc(100vh - 64px);
      width: 100vw;
      position: relative;
      z-index: 1;
    }
  </style>
</head>

                <input type="checkbox" id="recv-hex"> 16进制显示接收内容
              </label>
            </div>
            <button class="connect-btn" id="disconnect" style="margin-top:18px;background:linear-gradient(90deg,#e74c3c 0%,#c0392b 100%);">断开连接</button>
          </div>
        </div>
        <div id="page-attr" class="main-page" style="display:none;">
          <div class="comm-container"><div class="comm-title">设备属性</div><div>这里是设备属性内容。</div></div>
        </div>
        <div id="page-config" class="main-page" style="display:none;">
          <div class="comm-container"><div class="comm-title">设备配置</div><div>这里是设备配置内容。</div></div>

        <div id="page-net" class="main-page" style="display:none;">
          <div class="comm-container">
            <div class="comm-title">LUA配置</div>
            <div id="wireless-settings" class="wireless-settings">
              <!-- 动态添加设置项 -->
            </div>

              <div class="wireless-controls">
                <button id="refresh-settings" class="connect-btn">刷新TX</button>
                <span id="settings-status" class="settings-status"></span>

                <span id="settings-status-rx" class="settings-status"></span>

        </div>
        <div id="page-calib" class="main-page" style="display:none;">

            <div class="calib-btn-slider-row" style="display:flex;align-items:center;gap:32px;margin-bottom:18px;">
              <div class="calib-btn-group" id="calib-btn-group" style="display:flex;gap:18px;"></div>
              <div class="calib-slider-row" style="display:flex;align-items:center;gap:12px;min-width:220px;">
                <span class="calib-slider-label">S1</span>

              <div class="calib-joystick-wrap">

          <div class="comm-container" style="display:flex;justify-content:center;align-items:center;min-height:calc(100vh - 64px);background:linear-gradient(135deg,#e0e7ff 0%,#f4f6fb 100%);">
            <div id="fw-card" style="background:#fff;border-radius:22px;box-shadow:0 8px 36px rgba(79,140,255,0.15);padding:48px 60px 40px 60px;min-width:380px;max-width:520px;width:100%;display:flex;flex-direction:column;align-items:center;">
              <div class="comm-title" style="margin-bottom:32px;">固件更新</div>
              <div style="margin-bottom:22px;width:100%;display:flex;flex-direction:column;align-items:flex-start;">
                <label style="font-weight:bold;color:#3358e0;margin-bottom:8px;">设备型号</label>
                <select id="fw-device-type" style="padding:12px 14px;border-radius:8px;border:1.5px solid #d0d7e6;font-size:1.08em;width:100%;outline:none;transition:border 0.2s;">
                  <option value="A">型号A</option>
                  <option value="B">型号B</option>
                  <option value="C">型号C</option>
                </select>
              </div>
              <div style="margin-bottom:22px;width:100%;display:flex;flex-direction:column;align-items:flex-start;">
                <label style="font-weight:bold;color:#3358e0;margin-bottom:8px;">选择固件文件</label>
                <input type="file" id="fw-file" accept=".bin,.hex" style="font-size:1.08em;padding:10px 0;">
              </div>
              <div style="margin-bottom:22px;width:100%;display:flex;flex-direction:column;align-items:flex-start;">
                <label style="font-weight:bold;color:#3358e0;margin-bottom:8px;">更新进度</label>
                <div style="display:flex;align-items:center;width:100%;">
                  <progress id="fw-progress" value="0" max="100" style="width:70%;height:18px;border-radius:8px;background:#e0e7ff;"></progress>
                  <span id="fw-progress-text" style="margin-left:18px;font-weight:bold;color:#3358e0;min-width:48px;">0%</span>
                </div>
              </div>
              <button id="fw-update-btn" class="connect-btn" style="width:100%;margin-top:8px;margin-bottom:8px;font-size:1.15em;">确认更新</button>
              <div id="fw-status" style="margin-top:10px;color:#e74c3c;font-weight:bold;min-height:28px;text-align:center;width:100%;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    // 新结构页面元素
    const connectPage = document.getElementById('connect-page');
    const mainApp = document.getElementById('main-app');
    const connectBtn = document.getElementById('connect');
    const disconnectBtn = document.getElementById('disconnect');
    const sendBtn = document.getElementById('send');
    const inputBox = document.getElementById('input');
    const outputBox = document.getElementById('output');
    const statusBox = document.getElementById('serial-status');
    const sendMode = document.getElementById('send-mode');
    const recvHex = document.getElementById('recv-hex');
    const baudrateInput = document.getElementById('baudrate');
    const clearOutputBtn = document.getElementById('clear-output');

    let port = null;
    let writer = null;
    let reader = null;
    let isSerialConnected = false;
    let buffer = [];
    let isReading = false;

    // 页面切换逻辑
    const menuBtns = document.querySelectorAll('.menu-btn');
    const mainPages = document.querySelectorAll('.main-page');
    function showMainPage(page) {
      mainPages.forEach(p => p.style.display = 'none');
      document.getElementById('page-' + page).style.display = '';
      menuBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.page === page));
    }
    menuBtns.forEach(btn => {
      btn.onclick = () => showMainPage(btn.dataset.page);
    });
    // 连接成功后显示主菜单和内容
    function showCommPage() {
      connectPage.style.display = 'none';
      mainApp.style.display = '';
      showMainPage('comm');
      inputBox.focus();
    }
    // 断开连接后返回连接页面
    function showConnectPage() {
      connectPage.style.display = '';
      mainApp.style.display = 'none';
      statusBox.textContent = '未连接';
      connectBtn.textContent = '连接';
      connectBtn.disabled = false;
      baudrateInput.disabled = false;
      inputBox.value = '';
      outputBox.textContent = '';
    }

    // 设备信息栏
    const deviceInfoBar = document.getElementById('device-info-bar');
    const batteryBarFill = document.getElementById('battery-bar-fill');
    const batteryBarNum = document.getElementById('battery-bar-num');
    function updateDeviceInfoBar() {
      // 电量进度条
      let percent = 0;
      // 如果已连接设备后会被覆盖
      if (window._batteryPercent !== undefined) percent = window._batteryPercent;
      const batteryFill = document.getElementById('battery-bar-fill');
      const batteryHeadFill = document.querySelector('.battery-head-fill');
      // 更新电量百分比
      batteryFill.style.width = `${(percent / 100) * 27}px`;
      batteryBarNum.textContent = percent + '%';
      // 更新电量状态颜色
      const batteryState = percent > 60 ? 'high' : percent > 40 ? 'medium' : percent > 20 ? 'medium' : 'low';
      batteryFill.className = 'battery-inner ' + batteryState;
      // 满电时显示电池头填充
      if (batteryHeadFill) {
        batteryHeadFill.style.background = 
          batteryState === 'high' ? '#2ecc71' : 
          batteryState === 'medium' ? '#f1c40f' : '#e74c3c';
        batteryHeadFill.classList.toggle('show', percent >= 95);
      }
      deviceInfoBar.style.display = 'flex';
    }
    function hideDeviceInfoBar() {
      deviceInfoBar.style.display = 'none';
    }

    // 连接逻辑
    connectBtn.onclick = async () => {
      if (isSerialConnected) return;
      connectBtn.disabled = true;
      statusBox.textContent = '正在连接...';
      try {
        // 始终弹出串口选择
        const selectedPort = await navigator.serial.requestPort();
        const baudRate = parseInt(baudrateInput.value) || 115200;
        await selectedPort.open({ baudRate });
        port = selectedPort;
        writer = port.writable.getWriter();
        reader = port.readable.getReader();
        isSerialConnected = true;
        // 状态栏显示友好名称（如有）或VID/PID
        let portInfo = '已连接';
        // Chrome 115+ 可能有 port.getInfo().usbProductId/usbVendorId
        const info = port.getInfo();
        if (port.getInfo && (info.usbVendorId || info.usbProductId)) {
          portInfo += ` (VID:${info.usbVendorId ? info.usbVendorId.toString(16).toUpperCase() : ''}`;
          portInfo += info.usbProductId ? ` PID:${info.usbProductId.toString(16).toUpperCase()}` : '';
          portInfo += ')';
        }
        // 尝试显示friendlyName（部分浏览器实现）
        if (port.friendlyName) {
          portInfo = '已连接：' + port.friendlyName;
        }
        statusBox.textContent = portInfo;
        baudrateInput.disabled = true;
        updateDeviceInfoBar();
        showCommPage();
        readLoop();
      } catch (err) {
        statusBox.textContent = '连接失败: ' + err;
        connectBtn.disabled = false;
      }
    };

    // 断开连接逻辑
    disconnectBtn.onclick = async () => {
      if (!isSerialConnected) return;
      try {
        isSerialConnected = false;
        if (reader) { await reader.cancel(); reader.releaseLock(); }
        if (writer) writer.releaseLock();
        if (port) await port.close();
      } catch (e) {}
      port = null; writer = null; reader = null;
      showConnectPage();
      hideDeviceInfoBar();
    };

    // 发送数据（发送后不清空输入框）
    sendBtn.onclick = async () => {
      const data = inputBox.value.trim(); 
      if (!writer || !data) return;
      if (sendMode.value === 'hex') {
        // 16进制发送
        try {
          const bytes = data.split(/\s+/).map(b => {
            if (!/^([0-9a-fA-F]{2})$/.test(b)) throw new Error('请输入空格分隔的两位16进制数');
            return parseInt(b, 16);
          });
          await writer.write(new Uint8Array(bytes));
        } catch (e) {
          alert('16进制输入有误: ' + e.message);
        }
      } else {
        // 文本发送
        const encoder = new TextEncoder();
        await writer.write(encoder.encode(data + '\n'));
      }
      // 不清空inputBox
    };

    // 一键清空输出端
    clearOutputBtn.onclick = () => {
      outputBox.textContent = '';
    };

    // 读取串口数据
    async function readLoop() {
      if (isReading) return; // 防止多重循环
      isReading = true;
      const decoder = new TextDecoder();
      const commOutputBox = document.getElementById('output');
      let abnormalCount = 0;
      while (isSerialConnected) {
        // === YMODEM期间跳过串口消费 ===
        if (window._isYmodemBusy) {
          await new Promise(r => setTimeout(r, 20));
          continue;
        }
        try {
          const { value, done } = await reader.read();
          if (done) break;
          if (value) {
            if (commOutputBox) {
              if (recvHex && recvHex.checked) {
                const hexStr = Array.from(value).map(b => b.toString(16).padStart(2, '0')).join(' ');
                commOutputBox.textContent += `\n[RECV] ${hexStr}`;
              } else {
                const textStr = decoder.decode(new Uint8Array(value));
                commOutputBox.textContent += `\n[RECV] ${textStr}`;
              }
              commOutputBox.scrollTop = commOutputBox.scrollHeight;
            }
            buffer.push(...value);
            // 检查是否收满大包
            while (buffer.length >= 2) {
              const bigLen = (buffer[0] << 8) | buffer[1];
              // 健壮性校验
              if (bigLen < 2 || bigLen > 8192) {
                abnormalCount++;
                // console.warn('[readLoop] 异常包头，bigLen=', bigLen, 'buffer=', buffer.slice(0, 16), 'abnormalCount=', abnormalCount); // 已关闭异常包头日志
                const before = buffer.length;
                buffer.shift(); // 丢弃一个字节，避免死循环
                if (buffer.length === before) {
                  // 极端情况下buffer未减少，强制break防止死循环
                  // console.error('[readLoop] buffer.shift()无效，强制break'); // 已关闭异常包头日志
                  break;
                }
                if (abnormalCount > 10) {
                  // console.error('[readLoop] 异常包头连续过多，清空buffer'); // 已关闭异常包头日志
                  buffer = [];
                  abnormalCount = 0;
                  break;
                }
                continue;
              } else {
                abnormalCount = 0;
              }
              if (buffer.length >= bigLen) {
                const bigPacket = new Uint8Array(buffer.slice(0, bigLen));
                const container = document.getElementById('wireless-settings');
                if (container) container.innerHTML = '';
                parseCRSFPacket(bigPacket);
                buffer = buffer.slice(bigLen);
                document.getElementById('refresh-settings').disabled = false;
                document.getElementById('settings-status').textContent = '刷新完成';
              } else {
                break;
              }
            }
          }
        } catch (error) {
          // console.error('读取数据错误:', error); // 已关闭串口读取错误日志
          break;
        }
      }
      isReading = false;
    }

    // 监听串口断开事件
    if (navigator.serial) {
      navigator.serial.addEventListener('disconnect', (event) => {
        if (isSerialConnected && port === event.target) {
          isSerialConnected = false;
          port = null; writer = null; reader = null;
          showConnectPage();
          hideDeviceInfoBar();
        }
      });
    }

    // 页面初始化
    showConnectPage();

    // logo点击跳转设备属性页面
    document.getElementById('logo-img').onclick = () => {
      showMainPage('attr');
    };

    // 初始化电池电量为0
    batteryBarFill.style.width = '0';
    batteryBarNum.textContent = '0%';
    // 立即刷新电池栏为0%
    updateDeviceInfoBar();

    // ========== CRSF协议 0x2B参数包解析重构 ========== //
    // 分包缓存和去重变量（放在函数外部，防止多包时丢失）
    if (!window._crsfParamChunkCache) window._crsfParamChunkCache = new Map();
    if (!window._crsfLastParamNum) window._crsfLastParamNum = null;
    if (!window._crsfLastChunkNum) window._crsfLastChunkNum = null;
    // 新增：全局参数数据缓存
    if (!window._crsfParamDataMap) window._crsfParamDataMap = new Map();

    // 解析单个参数数据
    function parseParamData(paramData) {
      let p = 0;
      const parentFolder = paramData[p++];
      const dataType = paramData[p++];
      const baseType = dataType & 0x7F;
      const hidden = (dataType & 0x80) !== 0;
      // 解析name
      let nameEnd = p;
      while (paramData[nameEnd] !== 0) nameEnd++;
      const name = new TextDecoder().decode(paramData.slice(p, nameEnd));
      p = nameEnd + 1;
      let value = null, min = null, max = null, def = null, unit = '', decimal = null, step = null, strMaxLen = null, options = null, status = null, timeout = null, info = null;
      if ([0,1].includes(baseType)) { // UINT8/INT8
        value = paramData[p++]; min = paramData[p++]; max = paramData[p++]; def = paramData[p++];
        let unitEnd = p; while (paramData[unitEnd] !== 0) unitEnd++;
        unit = new TextDecoder().decode(paramData.slice(p, unitEnd));
        p = unitEnd + 1;
      } else if ([2,3].includes(baseType)) { // UINT16/INT16
        value = paramData[p] | (paramData[p+1] << 8); p += 2;
        min = paramData[p] | (paramData[p+1] << 8); p += 2;
        max = paramData[p] | (paramData[p+1] << 8); p += 2;
        def = paramData[p] | (paramData[p+1] << 8); p += 2;
        let unitEnd = p; while (paramData[unitEnd] !== 0) unitEnd++;
        unit = new TextDecoder().decode(paramData.slice(p, unitEnd));
        p = unitEnd + 1;
      } else if (baseType === 8) { // FLOAT
        value = (paramData[p] | (paramData[p+1]<<8) | (paramData[p+2]<<16) | (paramData[p+3]<<24)); p += 4;
        min = (paramData[p] | (paramData[p+1]<<8) | (paramData[p+2]<<16) | (paramData[p+3]<<24)); p += 4;
        max = (paramData[p] | (paramData[p+1]<<8) | (paramData[p+2]<<16) | (paramData[p+3]<<24)); p += 4;
        def = (paramData[p] | (paramData[p+1]<<8) | (paramData[p+2]<<16) | (paramData[p+3]<<24)); p += 4;
        decimal = paramData[p++];
        step = (paramData[p] | (paramData[p+1]<<8) | (paramData[p+2]<<16) | (paramData[p+3]<<24)); p += 4;
        let unitEnd = p; while (paramData[unitEnd] !== 0) unitEnd++;
        unit = new TextDecoder().decode(paramData.slice(p, unitEnd));
        p = unitEnd + 1;
      } else if (baseType === 9) { // TEXT_SELECTION
        let optsEnd = p; while (paramData[optsEnd] !== 0) optsEnd++;
        const optionsStr = new TextDecoder().decode(paramData.slice(p, optsEnd));
        options = optionsStr.split(';');
        p = optsEnd + 1;
        value = paramData[p++];
        min = paramData[p++];
        max = paramData[p++];
        def = paramData[p++];
        let unitEnd = p; while (paramData[unitEnd] !== 0) unitEnd++;
        unit = new TextDecoder().decode(paramData.slice(p, unitEnd));
        p = unitEnd + 1;
      } else if (baseType === 10) { // STRING
        strMaxLen = paramData[p++];
        let strEnd = p; while (paramData[strEnd] !== 0) strEnd++;
        value = new TextDecoder().decode(paramData.slice(p, strEnd));
        p = strEnd + 1;
        let defEnd = p; while (paramData[defEnd] !== 0) defEnd++;
        def = new TextDecoder().decode(paramData.slice(p, defEnd));
        p = defEnd + 1;
      } else if (baseType === 11) { // FOLDER
        // nothing more
      } else if (baseType === 12) { // INFO
        let infoEnd = p; while (paramData[infoEnd] !== 0) infoEnd++;
        value = new TextDecoder().decode(paramData.slice(p, infoEnd));
        p = infoEnd + 1;
      } else if (baseType === 13) { // COMMAND
        status = paramData[p++];
        timeout = paramData[p++];
        let infoEnd = p; while (paramData[infoEnd] !== 0) infoEnd++;
        info = new TextDecoder().decode(paramData.slice(p, infoEnd));
        p = infoEnd + 1;
      }
      return { parentFolder, dataType, baseType, hidden, name, value, min, max, def, unit, decimal, step, strMaxLen, options, status, timeout, info };
    }

    // 解析大包并渲染参数控件
    function parseCRSFPacket(bigPacket) {
      if (!bigPacket || bigPacket.length < 4) return '数据太短';
      let rxOrTx = '';
      // 跳过前2字节长度，去掉末尾3字节（CRC/0A/0D），判断包头
      if (bigPacket.length > 8) {
        // 例如: EE xx EE EC (RX) 或 EE xx EA EE (TX)
        const  b1 = bigPacket[5], b2 = bigPacket[6];
        // 打印前8字节内容
        console.log('CRSF包头前8字节:', Array.from(bigPacket.slice(0, 8)));
        if (b1 === 0xEE && b2 === 0xEC) {
          rxOrTx = 'RX';
          console.log('识别到类型: RX');
        } else if (b1 === 0xEA && b2 === 0xEE) {
          rxOrTx = 'TX';
          console.log('识别到类型: TX');
        } else {
          console.log('未识别到RX/TX类型');
        }
      }
      // 更新LUA配置标题
      const pageNet = document.getElementById('page-net');
      if (pageNet) {
        const titles = pageNet.getElementsByClassName('comm-title');
        for (let i = 0; i < titles.length; i++) {
          if (titles[i].textContent.startsWith('LUA配置')) {
            titles[i].textContent = 'LUA配置' + (rxOrTx ? ` (${rxOrTx})` : '');
          }
        }
      }
      // ====== 原有参数解析逻辑 ======
      let offset = 2;
      const paramChunkCache = new Map(); // paramNum -> {chunks:[], chunkNums:Set}
      while (offset + 2 < bigPacket.length) {
        const head = bigPacket[offset];
        const len = bigPacket[offset+1];
        const type = bigPacket[offset+2];
        if (len === 0) {
          offset++;
          continue;
        }
        const packetTotalLen = 2 + len;
        if (offset + packetTotalLen > bigPacket.length) break;
        const pkt = bigPacket.slice(offset + 2, offset + 2 + len); // pkt[0]=type
        if (type === 0x2B) {
          let po = 0;
          po++; // 跳过type
          const srcNode = pkt[po++];
          const dstNode = pkt[po++];
          const paramNum = pkt[po++];
          const chunkNum = pkt[po++];
          if (!paramChunkCache.has(paramNum)) paramChunkCache.set(paramNum, {chunks:[], chunkNums:new Set()});
          const entry = paramChunkCache.get(paramNum);
          if (entry.chunkNums.has(chunkNum)) {
            offset += packetTotalLen;
            continue;
          }
          entry.chunkNums.add(chunkNum);
          entry.chunks.push(pkt.slice(5));
        }
        offset += packetTotalLen;
      }
      // 组合结果：Map paramNum -> Uint8Array
      const paramDataMap = new Map();
      for (const [paramNum, entry] of paramChunkCache.entries()) {
        const fullData = new Uint8Array([].concat(...entry.chunks.map(a => Array.from(a))));
        paramDataMap.set(paramNum, fullData);
      }
      // 解析所有参数为结构化对象
      const paramList = [];
      for (const [paramNum, paramData] of paramDataMap.entries()) {
        const paramObj = parseParamData(paramData);
        paramObj.paramNum = paramNum;
        paramList.push(paramObj);
      }
      // 排序：只按paramNum（Parameter number）升序
      paramList.sort((a, b) => a.paramNum - b.paramNum);
      // 渲染参数控件
      const container = document.getElementById('wireless-settings');
      container.innerHTML = '';
      renderParameterControls(paramList, container);
      return paramList;
    }

    // --- 渲染参数控件回退为统一样式 ---
    function renderParameterControls(params, container, parent = 0,mode = null) {
      if (!mode) {
        // 通过标题判断
        const commTitle = document.querySelector('#page-net .comm-title');
        if (commTitle && commTitle.textContent.includes('RX')) mode = 'RX';
        else mode = 'TX';
      }
      // 渲染所有FOLDER类型为菜单（不区分父/子菜单样式）
      params.filter(p => p.baseType === 11 && p.parentFolder === parent && !p.hidden).forEach(folder => {

        ctx.fillStyle = '#f4f6fb';

        ctx.setLineDash([12, 10]);
        ctx.strokeStyle = '#bbb';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h);
        ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
        ctx.stroke();
        ctx.restore();
        // 中心红点
        ctx.beginPath();
        ctx.arc(w/2, h/2, 12, 0, 2 * Math.PI);
        ctx.fillStyle = '#e74c3c';
        ctx.shadowColor = '#e74c3c';
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
        // 动画：黑点沿边框方形运动，射线从中心到黑点
        // 计算黑点位置
        const perim = 4 * (w - 40); // 20px边距
        const speed = 120; // px/s
        const t = ((Date.now() - animStart) / 1000) * speed;
        let pos = (t + phase * perim/2) % perim;
        let bx, by;
        if (pos < w-40) { // top
          bx = 20 + pos; by = 20;
        } else if (pos < w-40 + h-40) { // right
          bx = w-20; by = 20 + (pos - (w-40));
        } else if (pos < 2*(w-40) + h-40) { // bottom
          bx = w-20 - (pos - (w-40 + h-40)); by = h-20;
        } else { // left
          bx = 20; by = h-20 - (pos - (2*(w-40) + h-40));
        }
        // 射线
        ctx.beginPath();
        ctx.moveTo(w/2, h/2);
        ctx.lineTo(bx, by);
        ctx.strokeStyle = 'rgba(79,140,255,0.95)';
        ctx.lineWidth = 5;
        ctx.shadowColor = '#4f8cff';
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.shadowBlur = 0;
        // 黑点

        ctx.fillStyle = '#111';
        ctx.shadowColor = '#111';
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
      }

    // YMODEM协议主入口（实现）
    async function ymodemSend(fileData, fileName, onProgress) {
      window._isYmodemBusy = true;
      try {
        // YMODEM常量
        const SOH = 0x01, STX = 0x02, EOT = 0x04, ACK = 0x06, NAK = 0x15, CAN = 0x18, CRC = 0x43;
        const PACKET_SIZE = 1024;
        const PACKET_SIZE_128 = 128;
        const MAX_RETRY = 15;
        const TIMEOUT = 5000; // ms, 增加等待时间
        // 工具函数
        function crc16(buf) {
          let crc = 0;
          for (let i = 0; i < buf.length; i++) {
            crc ^= (buf[i] << 8);
            for (let j = 0; j < 8; j++) {
              if (crc & 0x8000) crc = (crc << 1) ^ 0x1021;
              else crc <<= 1;
            }
          }
          return crc & 0xFFFF;
        }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
        // 监听ACK/NAK
        let ackQueue = [];
        let listen = true;
        const ackListener = async () => {
          while (listen) {
            try {
              const { value, done } = await reader.read();
              if (done) break;
              if (value && value.length > 0) {
                console.log('[YMODEM][RECV]', Array.from(value).map(b=>b.toString(16).padStart(2,'0')).join(' '));
                for (let b of value) {
                  if ([ACK, NAK, CAN, CRC, EOT].includes(b)) ackQueue.push(b);
                }
              }
            } catch (e) { break; }
          }
        };
        const listenPromise = ackListener();
        // 等待特定ACK
        async function waitAck(expect, timeout = TIMEOUT) {
          let t = Date.now();
          while (Date.now() - t < timeout) {
            if (ackQueue.length > 0) {
              let b = ackQueue.shift();
              if (expect.includes(b)) return b;
              // CAN立即中断
              if (b === CAN) throw new Error('对方中止传输');
            }
            await sleep(10);
          }
          throw new Error('超时未收到ACK/NAK');
        }
        // 1. 等待C
        let retry = 0;
        while (retry++ < MAX_RETRY) {
          try {
            await waitAck([CRC], 3000); // 握手等待也加长
            break;
          } catch (e) {
            if (retry >= MAX_RETRY) throw new Error('未收到C，设备未响应');
          }
        }
        // 2. 发送头包（SOH+128字节）
        let header = new Uint8Array(PACKET_SIZE_128 + 5);
        header[0] = SOH;
        header[1] = 0x00; // 包号
        header[2] = 0xFF;
        // 文件名和大小
        let nameBytes = new TextEncoder().encode(fileName);
        let sizeBytes = new TextEncoder().encode(fileData.length.toString());
        header.set(nameBytes, 3);
        header[3 + nameBytes.length] = 0x00;
        header.set(sizeBytes, 4 + nameBytes.length);
        header[4 + nameBytes.length + sizeBytes.length] = 0x00;
        // 填充0
        for (let i = 3 + nameBytes.length + 1 + sizeBytes.length + 1; i < 3 + PACKET_SIZE_128; i++) header[i] = 0;
        // CRC
        let crc = crc16(header.slice(3, 3 + PACKET_SIZE_128));
        header[PACKET_SIZE_128 + 3] = (crc >> 8) & 0xFF;
        header[PACKET_SIZE_128 + 4] = crc & 0xFF;
        // 头包重发
        retry = 0;
        while (retry++ < MAX_RETRY) {
          console.log('[YMODEM][SEND]', Array.from(header).map(b=>b.toString(16).padStart(2,'0')).join(' '));
          await writer.write(header);
          let buf = [];
          let t0 = Date.now();
          let gotAckCrc = false, gotDoubleCrc = false;
          while (Date.now() - t0 < TIMEOUT) {
            if (ackQueue.length > 0) {
              let b = ackQueue.shift();
              buf.push(b);
              // 检查06 43
              if (buf.length >= 2 && buf[buf.length-2] === ACK && buf[buf.length-1] === CRC) {
                gotAckCrc = true;
                break;
              }
              // 检查43 43
              if (buf.length >= 2 && buf[buf.length-2] === CRC && buf[buf.length-1] === CRC) {
                gotDoubleCrc = true;
                break;
              }
              // 检查NAK
              if (b === NAK) {
                break;
              }
            }
            await sleep(10);
          }
          if (gotAckCrc) break; // 正常流程
          if (gotDoubleCrc) { console.log('[YMODEM] Got 0x43 0x43, retry header'); continue; }
          if (retry >= MAX_RETRY) throw new Error('头包未被ACK+CRC');
        }
        // 3. 发送数据包（STX+1024字节）
        let total = fileData.length;
        let sent = 0;
        let pktNum = 1;
        while (sent < total) {
          let chunk = fileData.slice(sent, sent + PACKET_SIZE);
          let pkt = new Uint8Array(PACKET_SIZE + 5);
          pkt[0] = STX;
          pkt[1] = pktNum & 0xFF;
          pkt[2] = 0xFF - pkt[1];
          pkt.set(chunk, 3);
          for (let i = 3 + chunk.length; i < 3 + PACKET_SIZE; i++) pkt[i] = 0x1A; // 填充Ctrl+Z
          let crc = crc16(pkt.slice(3, 3 + PACKET_SIZE));
          pkt[PACKET_SIZE + 3] = (crc >> 8) & 0xFF;
          pkt[PACKET_SIZE + 4] = crc & 0xFF;
          retry = 0;
          while (retry++ < MAX_RETRY) {
            console.log('[YMODEM][SEND]', Array.from(pkt).map(b=>b.toString(16).padStart(2,'0')).join(' '));
            await writer.write(pkt);
            try {
              let ack = await waitAck([ACK, NAK], TIMEOUT);
              if (ack === ACK) break;
            } catch (e) {
              if (retry >= MAX_RETRY) throw new Error('数据包未被ACK');
            }
          }
          sent += chunk.length;
          pktNum = (pktNum + 1) & 0xFF;
          if (onProgress) onProgress(sent, total);
        }
        // 4. 发送EOT
        retry = 0;
        while (retry++ < MAX_RETRY) {
          console.log('[YMODEM][SEND]', '04');
          await writer.write(new Uint8Array([EOT]));
          try {
            let ack = await waitAck([ACK], TIMEOUT);
            if (ack === ACK) break;
          } catch (e) {
            if (retry >= MAX_RETRY) throw new Error('EOT未被ACK');
          }
        }
        // 5. 结束包（SOH+128字节空包）
        let endPkt = new Uint8Array(PACKET_SIZE_128 + 5);
        endPkt[0] = SOH;
        endPkt[1] = 0x00;
        endPkt[2] = 0xFF;
        for (let i = 3; i < 3 + PACKET_SIZE_128; i++) endPkt[i] = 0;
        let endCrc = crc16(endPkt.slice(3, 3 + PACKET_SIZE_128));
        endPkt[PACKET_SIZE_128 + 3] = (endCrc >> 8) & 0xFF;
        endPkt[PACKET_SIZE_128 + 4] = endCrc & 0xFF;
        retry = 0;
        while (retry++ < MAX_RETRY) {
          console.log('[YMODEM][SEND]', Array.from(endPkt).map(b=>b.toString(16).padStart(2,'0')).join(' '));
          await writer.write(endPkt);
          try {
            let ack = await waitAck([ACK], TIMEOUT);
            if (ack === ACK) break;
          } catch (e) {
            if (retry >= MAX_RETRY) throw new Error('结束包未被ACK');
          }
        }
        listen = false;
        await sleep(100);
        if (listenPromise) await listenPromise;
      } finally {
        window._isYmodemBusy = false;
      }
    }

    // --- 参数控件渲染增强 ---
    function renderParameterControls(params, container, parent = 0,mode = null) {
      if (!mode) {
        const commTitle = document.querySelector('#page-net .comm-title');
        if (commTitle && commTitle.textContent.includes('RX')) mode = 'RX';
        else mode = 'TX';
      }
      // 过滤掉VTX Administrator父菜单及其子菜单
      const vtxFolder = params.find(p => p.baseType === 11 && p.name && p.name.includes('VTX Administrator'));
      let vtxFolderNum = vtxFolder ? vtxFolder.paramNum : null;
      let filtered = params.filter(p => {
        if (vtxFolderNum !== null) {
          if (p.baseType === 11 && p.paramNum === vtxFolderNum) return false;
          if (p.parentFolder === vtxFolderNum) return false;
        }
        return true;
      });
      // 渲染所有FOLDER类型为菜单
      filtered.filter(p => p.baseType === 11 && p.parentFolder === parent && !p.hidden).forEach(folder => {
        const folderDiv = document.createElement('div');
        folderDiv.className = 'setting-item';
        folderDiv.style.background = '#eaf1ff';
        folderDiv.style.cursor = 'pointer';
        folderDiv.style.fontWeight = 'bold';
        folderDiv.style.textAlign = 'left';
        folderDiv.textContent = folder.name;
        folderDiv.onclick = function() {
          const sub = folderDiv.nextSibling;
          if (sub && sub.className === 'param-container') {
            sub.style.display = (sub.style.display === 'none' ? '' : 'none');
          }
        };
        container.appendChild(folderDiv);
        const subContainer = document.createElement('div');
        subContainer.className = 'param-container';
        subContainer.style.marginLeft = '24px';
        container.appendChild(subContainer);
        renderParameterControls(filtered, subContainer, folder.paramNum, mode);
      });
      // 渲染当前parent下的非FOLDER参数
      filtered.filter(p => p.parentFolder === parent && p.baseType !== 11 && !p.hidden).forEach(param => {
        const item = document.createElement('div');
        item.className = 'setting-item';
        item.style.display = 'flex';
        item.style.alignItems = 'center';
        item.style.justifyContent = 'space-between';
        item.style.gap = '18px';
        const label = document.createElement('span');
        label.className = 'setting-label';
        label.textContent = param.name + (param.unit ? ' (' + param.unit + ')' : '');
        label.style.textAlign = 'left';
        label.style.flex = '1 1 0';
        label.style.minWidth = '120px';
        label.style.maxWidth = '320px';
        item.appendChild(label);
        const control = document.createElement('div');
        control.className = 'setting-control';
        control.style.flex = '0 0 auto';
        control.style.display = 'flex';
        control.style.alignItems = 'center';
        control.style.gap = '10px';
        // 数值型
        if ([0,1,2,3,8].includes(param.baseType)) {
          const input = document.createElement('input');
          input.type = 'number';
          input.value = param.value;
          if (param.min !== null) input.min = param.min;
          if (param.max !== null) input.max = param.max;
          if (param.step !== null) input.step = param.step;
          input.style.width = '120px';
          input.style.minWidth = '120px';
          input.style.maxWidth = '120px';
          input.style.textAlign = 'right';
          input.onchange = () => {
            const modeByte = mode === 'TX' ? 0x11 : 0x22;
            const arr = [0xA5, 0x33, modeByte, param.paramNum, input.value, 0x0D, 0x0A];
            if (writer) writer.write(new Uint8Array(arr));
            console.log('数值型控件变更:', param.paramNum, '新值:', input.value);
          };
          control.appendChild(input);
        } else if (param.baseType === 9 && param.options) {
          // TEXT_SELECTION
          const select = document.createElement('select');
          select.style.width = '180px';
          select.style.minWidth = '180px';
          select.style.maxWidth = '180px';
          select.style.textAlign = 'right';
          param.options.forEach((opt, idx) => {
            const option = document.createElement('option');
            option.value = idx;
            option.textContent = opt;
            if (idx === param.value) option.selected = true;
            select.appendChild(option);
          });
          select.onchange = () => {
            const modeByte = mode === 'TX' ? 0x11 : 0x22;
            const arr = [0xA5, 0x33, modeByte, param.paramNum, Number(select.value), 0x0D, 0x0A];
            if (writer) writer.write(new Uint8Array(arr));
            console.log('已发送:', arr.map(x=>x.toString(16).padStart(2,'0')).join(' '));
          };
          control.appendChild(select);
        } else if (param.baseType === 10) {
          // STRING
          const input = document.createElement('input');
          input.type = 'text';
          input.value = param.value;
          input.maxLength = param.strMaxLen || 32;
          input.style.width = '180px';
          input.style.minWidth = '180px';
          input.style.maxWidth = '180px';
          input.style.textAlign = 'right';
          input.onchange = () => {
            console.log('字符串控件变更:', param.paramNum, '新值:', input.value);
          };
          control.appendChild(input);
        } else if (param.baseType === 13) {
          // COMMAND
          const btn = document.createElement('button');
          btn.textContent = '启动'; // 统一命名为启动
          btn.style.minWidth = '130px';
          btn.style.maxWidth = '130px';
          btn.onclick = () => {
            console.log('命令按钮点击:', param.paramNum, '状态:', param.status);
            const modeByte = mode === 'TX' ? 0x11 : 0x22;
            const arrStart = [0xA5, 0x33, modeByte, param.paramNum, 1, 0x0D, 0x0A];
            if (writer) writer.write(new Uint8Array(arrStart));
            console.log('已发送START:', arrStart.map(x=>x.toString(16).padStart(2,'0')).join(' '));
            // 弹窗逻辑...
            // ... existing code ...
          };
          control.appendChild(btn);
          if (param.info) {
            const infoSpan = document.createElement('span');
            infoSpan.textContent = param.info;
            infoSpan.style.marginLeft = '8px';
            control.appendChild(infoSpan);
          }
        } else if (param.baseType === 12) {
          // INFO
          const span = document.createElement('span');
          span.textContent = param.value;
          control.appendChild(span);
        } else {
          // 其他类型只读
          const span = document.createElement('span');
          span.textContent = param.value;
          control.appendChild(span);
        }
        item.appendChild(control);
        container.appendChild(item);
      });
    }

    // --- 无线配置刷新按钮一行横向并排 ---
    const wirelessControls = document.querySelector('.wireless-controls');
    if (wirelessControls) {
      wirelessControls.style.display = 'flex';
      wirelessControls.style.flexDirection = 'row';
      wirelessControls.style.justifyContent = 'center';
      wirelessControls.style.alignItems = 'center';
      wirelessControls.style.gap = '22px';
      wirelessControls.style.margin = '18px 0 0 0';
      const btns = wirelessControls.querySelectorAll('button');
      btns.forEach(btn => {
        btn.style.minWidth = '130px';
        btn.style.maxWidth = '130px';
        btn.style.fontSize = '1.08em';
        btn.style.margin = '0';
      });
      const spans = wirelessControls.querySelectorAll('span');
      spans.forEach(span => {
        span.style.minWidth = '80px';
        span.style.textAlign = 'left';
        span.style.display = 'inline-block';
      });
    }
  </script>
