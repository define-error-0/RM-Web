<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP 固件烧录</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #e0e7ff 0%, #f4f6fb 100%);
      color: #3358e0;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 40px;
      box-shadow: 0 8px 32px rgba(51, 88, 224, 0.12);
      max-width: 480px;
      text-align: center;
    }
    h1 { font-size: 1.25em; margin: 0 0 12px; }
    p { color: #555; line-height: 1.6; margin: 0 0 20px; }
    a.btn {
      display: inline-block;
      padding: 10px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      margin: 6px;
    }
    .primary {
      background: linear-gradient(90deg, #4f8cff, #3358e0);
      color: #fff;
    }
    .secondary {
      background: #e0e7ff;
      color: #3358e0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>正在打开 ESP 烧录工具…</h1>
    <p id="hint">若未自动跳转，请点击下方按钮。</p>
    <a id="open-flash" class="btn primary" href="#">打开烧录页面</a>
    <a class="btn secondary" href="Connection.html">返回配置工具</a>
  </div>
  <script>
    (function () {
      /* 必须带 dist/ 尾斜杠，否则 serve 去掉 index.html 后相对路径会 404 */
      var qs = window.location.search || '';
      var target = 'vendor/esptool-js/examples/typescript/dist/' + qs;
      var openLink = document.getElementById('open-flash');
      openLink.href = target;
      try {
        window.location.replace(target);
      } catch (e) {
        document.getElementById('hint').textContent =
          '自动跳转失败，请手动点击「打开烧录页面」。请使用 Chrome/Edge，并从 Web 根目录启动本地服务器（不要只打开 dist 目录）。';
      }
    })();
  </script>
</body>
</html>
